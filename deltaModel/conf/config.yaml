defaults:
    - _self_
    - hydra: settings
    - observations: MERIT_forward_zone  # camels_531, camels_671


## General -------------------------------#
trainedModel: /projects/mhpi/yxs275/model/generic_deltaModel_dhbv2.0/savedModel/HBV2.0/
mode: test  # train, test, train_test

ensemble_type: none  # none, pnn_parallel, pnn_sequential
random_seed: 111111
device: cuda
gpu_id: 5
multimodel_type: none
name: dmg-1.0-${observations.name}
save_path: ../results
# load_epoch: 50


## Training -------------------------------#
train:
    start_time: 1980/10/01
    end_time: 1995/09/30
    target: [flow_sim]
    batch_size: 100
    optimizer: Adadelta
    epochs: 1
    start_epoch: 0
    save_epoch: 5


## Testing -------------------------------#
test:
    start_time: 1980/01/01
    end_time: 2020/12/31
    batch_size: 400
    test_epoch: 100
    evaluation: False


## Loss Function -------------------------------#
loss_function:
    model: RmseLossComb  # RmseLossComb, NseLossBatch, NseSqrtLossBatch
    target: [flow_sim]
    alpha: 0.25
    weights:
        w1: 11.0
        w2: 1.0

## dPL Model -------------------------------#
dpl_model:
    nmul: 4
    rho: 365
    dy_drop: 0.0
    
    phy_model:
        #HBV : Feng, Dapeng, Jiangtao Liu, Kathryn Lawson, and Chaopeng Shen."Differentiable, Learnable, Regionalized Process‐Based Models With Multiphysical Outputs can Approach State‐Of‐The‐Art Hydrologic Prediction Accuracy." Water Resources Research 58, no. 10 (2022): e2022WR032404.
        #HBV_1_1p (1.1p) : Song, Y., Sawadekar, K., Frame, J. M., Pan, M., Clark, M., Knoben, W. J. M., Wood, A. W., Patel, T., & Shen, C. (2024b). Improving physics-informed, differentiable hydrologic models for capturing unseen extreme events. ESS Open Archive. https://doi.org/10.22541/essoar.172304428.82707157/v1
        #HBV_adj: Song, Y., Knoben, W. J. M., Clark, M. P., Feng, D., Lawson, K., Sawadekar, K., & Shen, C. (2024a). When ancient numerical demons meet physics-informed machine learning: Adjoint-based gradients for implicit differentiable modeling. Hydrology and Earth System Sciences, 28(13), 3051–3077. https://doi.org/10.5194/hess-28-3051-2024
        model: [HBV_2_0]  # HBV, HBV_1_1p (1.1p),HBV_adj, PRMS, SACSMA_with_snow
        warm_up: 0
        warm_up_states: False ## If False, tracking gradient from spin-up ## Increase your computational time. Slightly improve accuracy  ## Not used in the adjoint model.
        #stat_param_idx: -1
        dy_drop: 0.0
        dynamic_params:
            HBV: [parBETA, parBETAET]
            HBV_adj: [parBETA,parFC, parBETAET]
            HBV_1_1p: [parBETA, parBETAET, parK0]
            HBV_2_0: [parBETA, parK0, parBETAET]
            PRMS: [alpha, scx, cgw, resmax, k1, k2]
            SACSMA_with_snow: [pctim, smax, f1, f2, kuz, rexp, f3, f4, pfree, klzp, klzs, parCWH]

        routing: True
        AD_efficient: True   ## Specific for HBV_adj
        use_log_norm: []
        nearzero: 1e-5

        forcings: [
            'P','Temp','PET'
        ]

    nn_model:
        model: LSTMMLP

        LSTM_dropout: 0.5
        LSTM_hidden_size: 64
        MLP_dropout: 0.5
        MLP_hidden_size: 4096
        learning_rate: 1.0
        
        forcings: [
        'P','Temp','PET'
        ]
        attributes: [
        'ETPOT_Hargr', 'FW', 'HWSD_clay', 'HWSD_gravel', 'HWSD_sand',
                            'HWSD_silt', 'NDVI', 'Porosity', 'SoilGrids1km_clay',
                            'SoilGrids1km_sand', 'SoilGrids1km_silt', 'T_clay', 'T_gravel',
                            'T_sand', 'T_silt', 'aridity', 'glaciers', 'meanP', 'meanTa',
                            'meanelevation', 'meanslope', 'permafrost', 'permeability',
                            'seasonality_P', 'seasonality_PET', 'snow_fraction',
                            'snowfall_fraction','uparea'
        ]


## Multimodel -------------------------------#
multimodel:
    model: LSTM
    mosaic: False
    dropout: 0.5
    hidden_size: 256
    learning_rate: 0.1 #1.0
    scaling_function: sigmoid
    loss_function: RmseLossComb
    loss_function_weights:
        w1: 11.0
        w2: 1.0
    use_rb_loss: False
    loss_factor: 0.10
    loss_lower_bound: 0.7
    loss_upper_bound: 1.3

    forcings: [
        prcp,
        tmean,
        pet
    ]
    attributes: [
        p_mean,
        pet_mean,
        p_seasonality,
        frac_snow,
        aridity,
        high_prec_freq,
        high_prec_dur,
        low_prec_freq,
        low_prec_dur,
        elev_mean,
        slope_mean,
        area_gages2,
        frac_forest,
        lai_max,
        lai_diff,
        gvf_max,
        gvf_diff,
        dom_land_cover_frac,
        dom_land_cover,
        root_depth_50,
        soil_depth_pelletier,
        soil_depth_statsgo,
        soil_porosity,
        soil_conductivity,
        max_water_content,
        sand_frac,
        silt_frac,
        clay_frac,
        geol_1st_class,
        glim_1st_class_frac,
        geol_2nd_class,
        glim_2nd_class_frac,
        carbonate_rocks_frac,
        geol_porosity,
        geol_permeability
    ]
